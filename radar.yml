name: Basin Radar Daily

on:
  workflow_dispatch:
  schedule:
    # 7:00 AM Central during daylight time. Adjust to 13:00 UTC during standard time if needed.
    - cron: "0 12 * * 1-5"

permissions:
  contents: write

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm install; else echo "No package.json; runner uses native Node fetch."; fi

      - name: Run Basin Radar
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node basin-radar-runner.js

      - name: Commit updated radar data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data
          cp radar-leads.json data/radar-leads.json
          git add radar-leads.json data/radar-leads.json || true
          git diff --cached --quiet && echo "No radar changes to commit" || git commit -m "Update Basin Radar leads"
          git push
