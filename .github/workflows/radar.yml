name: Basin Radar Daily

on:
  workflow_dispatch:
  schedule:
    # 7:00 AM Central during daylight time. Change to 13:00 UTC during standard time if desired.
    - cron: "0 12 * * 1-5"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run Basin Free Feed Radar
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile

          RADAR_DISCOVERY_PROVIDER: feeds
          RADAR_USE_TAVILY: "false"
          RADAR_USE_FREE_FEEDS: "true"
          RADAR_GEO_MODE: texas_first_nationwide

          RADAR_MAX_FEED_ITEMS: "250"
          RADAR_MAX_LEADS: "120"
          RADAR_MAX_GROQ_ANALYZE: "12"
          RADAR_MIN_GROQ_SCORE: "55"
          RADAR_RECHECK_REJECTED_DAYS: "7"

          RADAR_REQUIRE_NAMED_CONTACT: "true"
          RADAR_REQUIRE_CONTACT_ROUTE: "true"
        run: node basin-radar-runner.js

      - name: Commit updated radar data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data
          cp radar-leads.json data/radar-leads.json
          if [ -f radar-rejected.json ]; then cp radar-rejected.json data/radar-rejected.json; fi
          if [ -f radar-run-log.json ]; then cp radar-run-log.json data/radar-run-log.json; fi
          git add radar-leads.json data/radar-leads.json radar-rejected.json data/radar-rejected.json radar-run-log.json data/radar-run-log.json radar-sources.json || true
          git diff --cached --quiet && echo "No radar changes to commit" || git commit -m "Update Basin free feed radar leads"
          git push
