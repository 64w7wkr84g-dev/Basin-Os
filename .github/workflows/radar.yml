name: Basin Radar Daily

on:
  workflow_dispatch:
  schedule:
    # 7:00 AM Central during daylight time. Adjust to 13:00 UTC during standard time if needed.
    - cron: "0 12 * * 1-5"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm install; else echo "No package.json; runner uses native Node fetch."; fi

      - name: Run Basin Radar
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
          RADAR_GEO: nationwide USA
          RADAR_MAX_RESULTS: "5"
          RADAR_MAX_QUERIES: "36"
          RADAR_MAX_ENRICH: "70"
          RADAR_MAX_RECHECK: "75"
          RADAR_TEXAS_FIRST: "true"
          RADAR_REQUIRE_NAMED_CONTACT: "true"
          RADAR_REQUIRE_CONTACT_ROUTE: "true"
          RADAR_WRITE_REJECTED: "true"
        run: node basin-radar-runner.js

      - name: Commit updated radar data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p data
          cp radar-leads.json data/radar-leads.json
          if [ -f radar-rejected.json ]; then cp radar-rejected.json data/radar-rejected.json; fi
          git add radar-leads.json data/radar-leads.json radar-rejected.json data/radar-rejected.json || true
          git diff --cached --quiet && echo "No radar changes to commit" || git commit -m "Update Basin Radar leads"
          git push
